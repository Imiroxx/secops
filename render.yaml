services:
  - type: web
    name: secops-global
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      # DATABASE_URL should be added manually in Render Dashboard 
      # or linked to an existing database service
